name: Update README

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bust GitHub camo cache by updating image URL timestamp
        run: |
          git config user.email "ah.saim786@gmail.com"
          git config user.name "SaimiAh"
          TIMESTAMP=$(date +%Y%m%d%H%M)
          sed -i "s/hide_border=true&t=[0-9]*/hide_border=true\&t=$TIMESTAMP/" README.md
          git add README.md
          git diff --staged --quiet || git commit -m "chore: bust cache $TIMESTAMP" && git push
