name: Update README

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:          # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Touch README to bust GitHub cache
        run: |
          git config user.email "ah.saim786@gmail.com"
          git config user.name "SaimiAh"
          touch README.md
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh README stats"
          git push
