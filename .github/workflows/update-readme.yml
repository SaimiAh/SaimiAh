name: Update README

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp in README to bust GitHub cache
        run: |
          git config user.email "ah.saim786@gmail.com"
          git config user.name "SaimiAh"
          sed -i "s/<!-- updated:.*-->/<!-- updated: $(date) -->/" README.md
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh README stats"
          git push
